# ==============================================================================
# CẤU HÌNH HỆ THỐNG HUẤN LUYỆN KHÔI PHỤC PHA TỰ GIÁM SÁT ĐA GÓC
# ==============================================================================

# Cấu hình dữ liệu và tiền xử lý
data:
  image_height: 256
  image_width: 256
  filter_radius: 50          # Bán kính bộ lọc thông thấp miền Fourier (đơn vị pixel)
  bit_depth_auto: true       # Tự động nhận diện độ sâu màu (8-bit hoặc 16-bit) để chuẩn hóa
  synthetic_data: false      # Sử dụng dữ liệu thực tế từ raw_dir
  raw_dir: "./data/raw"      # Đường dẫn chứa ảnh thực tế (.bmp, .tif, .png)
  synthetic_dir: "./data/synthetic"

# Tham số Huấn luyện (Training Hyperparameters)
train:
  batch_size: 8
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  val_split: 0.1
  seed: 42

# Trọng số của các hàm Loss (Loss weights)
loss:
  lambda_physics: 1.0        # Trọng số của Differentiable Physics Loss
  lambda_consistency: 0.5    # Trọng số của Complex Consistency Loss giữa các góc
  lambda_sparsity: 0.01      # Trọng số của Sparsity Loss cho pha vùng nền (background)

# Cấu hình Đường dẫn Hệ thống
paths:
  checkpoint_dir: "./checkpoints"
  output_dir: "./outputs"
  best_model_name: "best_model.pth"
  latest_model_name: "latest_model.pth"

# Cấu hình Môi trường Đám mây & Checkpoint
cloud:
  device: "cuda"             # "cuda" hoặc "cpu"
  use_huggingface: false     # Tự động đẩy model checkpoint lên Hugging Face Hub
  hf_repo_id: ""             # Ví dụ: "your_username/multiangle_phase_retrieval"
  checkpoint_save_interval: 10 # Số lượng epoch lưu checkpoint dự phòng một lần
